openapi: 3.0.0
info:
  title: SyncMind API
  description: Project Management features for SyncMind
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local development server
paths:
  /projects:
    get:
      summary: List all projects the authenticated user is involved in
      responses:
        '200':
          description: A list of projects
    post:
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, key, issue_types]
              properties:
                name: { type: string }
                key: { type: string, pattern: '^[A-Z]{2,10}$' }
                icon: { type: string, format: uri }
                issue_types: { type: array, items: { type: string } }
      responses:
        '201':
          description: Project created successfully
  /projects/{project}:
    get:
      summary: Get project details
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project details
    put:
      summary: Update project details
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                icon: { type: string, format: uri }
                issue_types: { type: array, items: { type: string } }
      responses:
        '200':
          description: Project updated successfully
    delete:
      summary: Delete a project
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project deleted
  /projects/{project}/transfer:
    post:
      summary: Transfer ownership of the project
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_creator_id]
              properties:
                new_creator_id: { type: integer }
      responses:
        '200':
          description: Ownership transferred successfully
  /projects/{project}/members:
    get:
      summary: List members of a project
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A list of members
    post:
      summary: Add a member to a project
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [admin, normal] }
      responses:
        '201':
          description: Member added successfully
  /projects/{project}/members/{member}:
    put:
      summary: Update member role
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
        - in: path
          name: member
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [admin, normal] }
      responses:
        '200':
          description: Member role updated
    delete:
      summary: Remove a member
      parameters:
        - in: path
          name: project
          required: true
          schema:
            type: string
        - in: path
          name: member
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Member removed successfully

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-24">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-background w-full top-0 sticky flex items-center justify-between px-margin-mobile h-touch-target-min z-50">
<div class="flex items-center gap-stack-sm">

</div>
<div class="font-headline-md-mobile text-headline-md-mobile text-primary dark:text-primary-fixed font-headline-md">

</div>
</header>

<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="Search projects..." type="text"/>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Card 1 -->

</div>

</div>
</div>

</button>

</div>
<div class="flex items-center gap-unit">

</div>

<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-status-resolved">

</div>
<div>
<h3 class="font-title-lg text-title-lg text-on-surface">iOS App V2</h3>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">IOS</span>
</div>
</div>
<button class="text-on-surface-variant hover:bg-surface-container p-1 rounded-full transition-colors">
<span class="material-symbols-outlined">more_vert</span>

<div class="mt-stack-sm flex items-center gap-stack-md text-on-surface-variant">

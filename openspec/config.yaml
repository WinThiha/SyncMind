schema: spec-driven
delivery:
  tools:
    - antigravity
    - gemini # (optional)

context: |
  Test execution policy:
  - Prefer Docker test runs.
  - Always clear Laravel config cache before any Laravel test command.
  - Backend full/filtered test commands:
    1) docker compose exec backend php artisan config:clear
    2) docker compose exec backend sh -lc 'APP_ENV=testing DB_CONNECTION=pgsql DB_HOST=db DB_DATABASE=syncmind_test DB_USERNAME=syncmind DB_PASSWORD=secret php artisan test'
    3) For filtered runs, append --filter=<TestName> to the php artisan test command in step 2.
  - Frontend test command:
    docker compose exec frontend npm run test

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
